name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            set -euo pipefail

            if [ "$(id -un)" != "bolderbrain" ]; then
              echo "Deployment must run as bolderbrain user"
              exit 1
            fi

            cd /home/bolderbrain/htdocs/bolderbrain.com

            git pull origin main

            npm ci

            npx prisma db push

            rm -rf .next

            npm run build

            pm2 restart bolderbrain --update-env

            pm2 save

            for attempt in {1..15}; do
              if curl -fsS http://127.0.0.1:3000/api/health; then
                break
              fi
              if [ "$attempt" -eq 15 ]; then
                echo "Health check failed after 15 attempts"
                exit 1
              fi
              sleep 2
            done
